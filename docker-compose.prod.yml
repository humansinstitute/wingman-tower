services:
  postgres:
    image: postgres:16-alpine
    container_name: wingman-tower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-coworker_v4}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - tower-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-coworker_v4}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: wingman-tower-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_S3_ACCESS_KEY:-superbased}
      MINIO_ROOT_PASSWORD: ${STORAGE_S3_SECRET_KEY:-superbased-secret}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - tower-minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: wingman-tower-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$STORAGE_S3_ACCESS_KEY $$STORAGE_S3_SECRET_KEY; do
        echo 'waiting for minio...';
        sleep 2;
      done &&
      mc mb -p local/$$STORAGE_S3_BUCKET || true &&
      mc anonymous set none local/$$STORAGE_S3_BUCKET || true
      "
    environment:
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-superbased}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-superbased-secret}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-superbased-storage}

  tower:
    build:
      context: .
    container_name: wingman-tower-b3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - ${TOWER_ENV_FILE:-.env.prod}
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-coworker_v4}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      PORT: ${TOWER_PORT:-3100}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_ENDPOINT_PUBLIC: ${STORAGE_S3_ENDPOINT_PUBLIC:-http://127.0.0.1:9000}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-superbased}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-superbased-secret}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-superbased-storage}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      STORAGE_PRESIGN_UPLOAD_TTL_SECONDS: ${STORAGE_PRESIGN_UPLOAD_TTL_SECONDS:-900}
      STORAGE_PRESIGN_DOWNLOAD_TTL_SECONDS: ${STORAGE_PRESIGN_DOWNLOAD_TTL_SECONDS:-900}
      SUPERBASED_DIRECT_HTTPS_URL: ${SUPERBASED_DIRECT_HTTPS_URL:-https://sb4.otherstuff.studio}
      ADMIN_NPUB: ${ADMIN_NPUB:-npub1jss47s4fvv6usl7tn6yp5zamv2u60923ncgfea0e6thkza5p7c3q0afmzy}
      SUPERBASED_SERVICE_NSEC: ${SUPERBASED_SERVICE_NSEC}
      SUPERBASED_SERVICE_PUBKEY_HEX: ${SUPERBASED_SERVICE_PUBKEY_HEX:-}
      SUPERBASED_SERVICE_NPUB: ${SUPERBASED_SERVICE_NPUB:-}
      DB_WAIT_MAX_ATTEMPTS: ${DB_WAIT_MAX_ATTEMPTS:-40}
    ports:
      - "${TOWER_HOST_PORT:-3100}:3100"

volumes:
  tower-postgres-data:
  tower-minio-data:
