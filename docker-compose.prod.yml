services:
  postgres:
    image: postgres:16-alpine
    container_name: wingman-tower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-coworker_v4}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - tower-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-coworker_v4}"]
      interval: 5s
      timeout: 5s
      retries: 20

  tower:
    build:
      context: .
    container_name: wingman-tower-b3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${TOWER_ENV_FILE:-.env.prod}
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-coworker_v4}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      PORT: ${TOWER_PORT:-3100}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://host.docker.internal:9000}
      STORAGE_S3_ENDPOINT_PUBLIC: ${STORAGE_S3_ENDPOINT_PUBLIC:-https://storage.otherstuff.ai}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-superbased}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-superbased-secret}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-superbased-storage}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      STORAGE_PRESIGN_UPLOAD_TTL_SECONDS: ${STORAGE_PRESIGN_UPLOAD_TTL_SECONDS:-900}
      STORAGE_PRESIGN_DOWNLOAD_TTL_SECONDS: ${STORAGE_PRESIGN_DOWNLOAD_TTL_SECONDS:-900}
      SUPERBASED_DIRECT_HTTPS_URL: ${SUPERBASED_DIRECT_HTTPS_URL:-https://sb4.otherstuff.studio}
      ADMIN_NPUB: ${ADMIN_NPUB:-npub1jss47s4fvv6usl7tn6yp5zamv2u60923ncgfea0e6thkza5p7c3q0afmzy}
      SUPERBASED_SERVICE_NSEC: ${SUPERBASED_SERVICE_NSEC}
      SUPERBASED_SERVICE_PUBKEY_HEX: ${SUPERBASED_SERVICE_PUBKEY_HEX:-}
      SUPERBASED_SERVICE_NPUB: ${SUPERBASED_SERVICE_NPUB:-}
      DB_WAIT_MAX_ATTEMPTS: ${DB_WAIT_MAX_ATTEMPTS:-40}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TOWER_HOST_PORT:-3100}:3100"

volumes:
  tower-postgres-data:
